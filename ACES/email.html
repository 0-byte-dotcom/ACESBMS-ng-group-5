<!DOCTYPE html>
<html lang="en">
   <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width-device-width, initial-scale=1.0">
    <title>ACES email</title>
    <link rel="stylesheet" href="main.css">
    <script src="script.js"></script>
   </head>
    <body>
        <!-- contact email -->
         <div class="email-container">
            <form action="" class="email">
                <div class="email-form">
                <h2>Get in touch with us</h2></div>
                <input type="text" name="name" placeholder="Your Name" class="email-contact" required>
                <input type="email" name="email" placeholder="Your Email" class="email-contact" required>
                <textarea name="message" placeholder="Your Message" class="email-contact" required></textarea>
                <button class="submit" type="submit">Submit</button>
            </form>
         </div>
    </body>
</html>
